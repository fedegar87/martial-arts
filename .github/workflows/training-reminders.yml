name: Training reminders

on:
  schedule:
    - cron: "*/15 * * * *"
  workflow_dispatch:

jobs:
  trigger:
    runs-on: ubuntu-latest
    timeout-minutes: 2
    steps:
      - name: Call reminder endpoint
        env:
          CRON_URL: ${{ secrets.TRAINING_REMINDER_CRON_URL }}
          CRON_SECRET: ${{ secrets.CRON_SECRET }}
        run: |
          test -n "$CRON_URL"
          test -n "$CRON_SECRET"
          curl --fail-with-body --retry 2 --retry-delay 5 --max-time 30 \
            -H "Authorization: Bearer $CRON_SECRET" \
            "$CRON_URL"
