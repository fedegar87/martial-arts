<!doctype html>
<html lang="it">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Skill Practice - offline</title>
    <style>
      :root {
        color-scheme: dark;
        background: #080808;
        color: #e8dfd0;
        font-family: Georgia, "Times New Roman", serif;
      }
      body {
        min-height: 100vh;
        margin: 0;
        display: grid;
        place-items: center;
        padding: 24px;
      }
      main {
        max-width: 420px;
        border: 1px solid #1e1c1a;
        background: #111111;
        padding: 24px;
      }
      h1 {
        margin: 0 0 12px;
        color: #c8a84b;
      }
      p {
        margin: 0;
        color: #c7baa4;
        line-height: 1.5;
      }
    </style>
  </head>
  <body>
    <main>
      <h1>Offline</h1>
      <p>
        La pagina richiesta non e' ancora in cache. Riaprila una volta online,
        poi sara' disponibile anche senza connessione.
      </p>
    </main>
  </body>
</html>
